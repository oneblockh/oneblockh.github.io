<script>
  /*时间*/
  function updateTime() {
  const timeDisplay = document.getElementById('time-display');
  const now = new Date();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const seconds = now.getSeconds().toString().padStart(2, '0');
  const timeString = `${hours}:${minutes}:${seconds}`;
  timeDisplay.textContent = timeString;}
  setInterval(updateTime, 1000);updateTime();
  /*年月日*/
  function updateDate() {
    const dateDisplay = document.getElementById('date-display');
    const now = new Date();
    const year = now.getFullYear();
    const month = (now.getMonth() + 1).toString().padStart(2, '0');
    const day = now.getDate().toString().padStart(2, '0');
    const dateString = `${year}-${month}-${day}`;
    dateDisplay.textContent = dateString;}
    setInterval(updateDate, 1000);
    updateDate();
  /*黑白主题切换*/
  function toggleTheme() {var body = document.body;body.classList.toggle('night-theme');}
    /*页面切换*/
    function showPage(pageId) {const pages = document.querySelectorAll('section');pages.forEach(page => {page.style.display = 'none';});const targetPage = document.getElementById(pageId);targetPage.style.display = 'block';}

</script>
