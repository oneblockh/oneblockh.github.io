<style>
/* 重置列表样式 */
ul {
list-style-type: none;
margin: 0;
padding: 0;
overflow: hidden;
background-color: #333;
}
/* 设置列表项为横向排列 */
li {
float: left;
}
/* 设置链接样式 */
li a {
display: block;
color: white;
text-align: center;
padding: 14px 16px;
text-decoration: none;
}
/* 鼠标悬停时的背景颜色变化 */
li a:hover {
background-color: #111;
}
</style>
<body>
<ul>
<li><h1 align="left">hello</h1></li>
<li><a href="#home">主页</a></li>
<li><a href="#news">新闻</a></li>
<li><a href="#about">关于</a></li>
</ul>
