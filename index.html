  <style>
    *{transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);}
    body,body.light {background-color: #ababab;color: #000000;}
    body.dark {background-color: #20262c;color: #ffffff;}
    .block,body.light .block{backdrop-filter:blur(2.5px) brightness(100%) saturate(125%) url(#glass);border-color:rgba(0, 0, 0, 0.8);}
    .block body.dark{border-color:rgba(255, 255, 255, 0.8);}
    .block_border{border-radius: 25px;border: 1px solid transparent;padding: 3px;}
    .block_border:hover,body.light .block_border:hover{border-radius: 25px;border: 1px solid #000000;box-shadow: 11px 8px 25px 11px rgba(225, 225, 225, 0.5);}
    body.dark .block_border:hover{border: 1px solid #ffffff;}
    #blog_all_card {display: grid;grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));gap: 1.25rem;}
    .blog-card,body.light .blog-card{background-color: transparent;border-radius: 25px;padding: 1.25rem;border: 1px solid #000000;overflow: hidden;}
    body.dark .blog-card {border: 1px solid #ffffff;}
    .blog-card:hover{box-shadow: 11px 8px 25px 11px rgba(225, 225, 225, 0.5);}
    .blog-card h3,body.light .blog-card h3  {bottom: 0.5rem;margin:0;text-align: left;color:#000000;}
    .blog-card p,body.light .blog-card p {font-size: 0.9rem;text-align: left;color:#000000;}
    body.dark .blog-card h3,body.dark .blog-card p{color: #ffffff;}
    #theme,body.light #theme, #back_button,body.light #back_button{background-color: transparent;border-radius: 25px;color: #000000;border: 1px solid #000000;padding: 0 8px;}
    body.dark #theme{color: #ffffff;border: 1px solid #ffffff;}
    #search_input,body.light #search_input{width:95%;max-width:500px;min-width: 125px;background-color: transparent;padding: 0.5rem 1rem;display: block;margin: 0 auto;border-radius: 25px;border: 1px solid #000000;}    
    body.dark #back_button,body.dark #search_input {border: 1px solid #ffffff;color: #ffffff;}
    svg,body.light svg{fill: #000000;}
    body.dark svg{fill:#ffffff;}
    #blog_content blockquote,body.light #blog_content blockquote{border-left: 3px solid #000000;padding-left: 1rem;margin: 1.25rem 0;}
    body.dark #blog_content blockquote {border-left: 3px solid #ffffff;}
    #blog_content pre {background: rgba(96, 102, 101, 0.5);color: #f8fafc;padding: 1rem;border-radius: 8px;overflow-x: auto;margin: 1.25rem 0;}
    table,body.light table{border: 1px solid #000000;border-radius: 11px;}
    th, td ,body.light th,body.light td {border: 1px solid #000000;padding: 16px;border-radius: 8px;}
    body.dark table ,body.dark th,body.dark td{border: 1px solid #ffffff;}
  </style>

</head>

  <main class="block" style="display: block;padding:25px;border-radius: 25px;border: 1px solid;" role="main">

  <script>
    var body = document.getElementsByTagName('body')[0];
      if(matchMedia('(prefers-color-scheme: dark)').matches) {
        body.className = 'dark';
      } else {
      body.className = 'light';
      }
    function change_theme() {
      if (body.className === 'light') {
        body.className = 'dark';
      } else {
      body.className = 'light';
      }
    }
  </script>
  <script>
    var blog_all = {};
    document.addEventListener('DOMContentLoaded', function() {render_blog_card();document.getElementById('back_button').addEventListener('click', show_blog_list);start_search();});
    function render_blog_card(filter_blog_names) {
      var blog_all_card = document.getElementById('blog_all_card');
      blog_all_card.innerHTML = '';
      var blog_file_names;
      if (Array.isArray(filter_blog_names)) {
        blog_file_names = filter_blog_names;
      } else {
        blog_file_names = Object.keys(blog_all);
      }
      for (var i = 0; i < blog_file_names.length; i++) {
        var blog_file_name = blog_file_names[i];
        if (!blog_all.hasOwnProperty(blog_file_name)) continue;
        var meta = blog_all[blog_file_name];
        var card = document.createElement('button');
        card.className = 'blog-card';
        card.innerHTML = '<h3>' + blog_file_name.replace('.md', '') + '</h3>' + '</div>' + '<p>' + (meta.content ? meta.content.substring(0, 60) : '') + '...</p>';
        card.addEventListener('click', (function(blog_file_name, content) { return function() { show_blog_article(blog_file_name, content); }; })(blog_file_name, meta.content));
        blog_all_card.appendChild(card);
      }
    }
    function show_blog_article(blog_file_name, content) {
        document.getElementById('bloglist').style.display = 'none';
        document.getElementById('blog_article').style.display = 'block';
        document.getElementById('article_title').textContent = blog_file_name.replace('.md', '');
        document.getElementById('blog_content').innerHTML = marked.parse(content);
    }
    function show_blog_list() {
        document.getElementById('bloglist').style.display = 'block';
        document.getElementById('blog_article').style.display = 'none';
    }
    function start_search() {
      var search_input = document.getElementById('search_input');
      function find_blog_article() {
        var keyword = search_input.value.toLowerCase().trim();
        if (!keyword) {render_blog_card();return;}
        var matched = [];
        for (var blog_file_name in blog_all) {
          if (!blog_all.hasOwnProperty(blog_file_name)) continue;
          var displayName = blog_file_name.replace('.md', '').toLowerCase();
          if (displayName.indexOf(keyword) !== -1) matched.push(blog_file_name);
        }
        render_blog_card(matched);
      }
      search_input.addEventListener('input', find_blog_article);
    }
    function load_blog_article() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://api.github.com/repos/oneblockh/oneblockh.github.io/contents/backup', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var files = JSON.parse(xhr.responseText);
                    var i = 0;
                    function load_next_blog_article() {
                        if (i >= files.length) {render_blog_card();return;}
                        var file = files[i];
                        i++;
                        if (file.name && file.name.length > 3 && file.name.substr(file.name.length - 3) === '.md') {
                            var contentXhr = new XMLHttpRequest();
                            contentXhr.open('GET', file.download_url, true);
                            contentXhr.onreadystatechange = function() {
                              if (contentXhr.readyState === 4) {if (contentXhr.status === 200) {blog_all[file.name] = {content: contentXhr.responseText};}load_next_blog_article();}
                          };
                          contentXhr.send();
                        } 
                        else {load_next_blog_article();}
                    }
                    load_next_blog_article();
                } 
                else {console.error('error', xhr.statusText);}
            }
        };
        xhr.send();
    }
    window.addEventListener('load', load_blog_article);
  </script>
