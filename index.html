<html lang="zh"><title>oneblockh</title><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><!页面>
<head><style>
ul {list-style-type: none;margin: 0;padding: 0;overflow: hidden;background-color: #7f797900;/*position: fixed*/;top: 0px;left: 0px;width: 100%;}
:root {--text-color: black;--wh-color:rgba(248, 248, 248, 0.5);}
body {
    height: 100%;
    width: 100%;
    background: url('background.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
    align-items: center;
    margin: 0;
    padding: 0;       
    font-family: Arial, sans-serif;
    background-color: var(--background-color); 
    color: var(--text-color);
    transition: background-color 0.5s ease, color 0.5s ease;
}
.page{justify-content: space-between;margin: 1em auto 1em;}
.window{background: var(--wh-color);padding: 5px 11px;transition: background-color 0.2s ease, color 0.2s ease;border-radius: 11px;box-shadow: 7px 3px 25px 11px rgba(201, 196, 196, 0.25);backdrop-filter: blur(1.7px) brightness(100%);}
#time-display {font-size: 25px;font-weight: bold;text-align: center;}
#date-display {font-size: 15px;font-weight: bold;text-align: center;}
.card{display: flex;flex-wrap: wrap;align-items: center;justify-content: center;}
.card a{background: var(--wh-color);border-radius: 3px;color: var(--text-color);box-shadow: 5px 3px 25px 11px rgba(201, 196, 196, 0.25);transition: background-color 0.2s ease, color 0.2s ease;}
.card a:hover{box-shadow: 7px 3px 25px 11px rgba(201, 196, 196, 0.25);backdrop-filter: blur(0.3px) brightness(100%);}
.night-theme {--text-color: white;--wh-color:rgba(12, 11, 11, 0.5);}
.buttons{background-color:rgb(0, 0, 0, 0);color:var(--text-color);border: 1px solid var(--text-color);transition:color 0.5s ease;border-radius: 3px;}
.buttons:hover{font-size:15px;}
.projectlists{max-width: 100%;max-height: 50%; overflow-y: auto; /* 添加垂直滚动条 */;}
table,td,td a:hover,.bh:hover{border: 1px solid var(--text-color) ;border-radius: 3px;transition: background-color 0.1s ease,color 0.2s ease;}
.typing {width: max-content;white-space: nowrap;overflow: hidden;border-right: 3px solid var(--text-color);/* 设置动画无限重复 */animation: typingAnimation 3s steps(40) infinite;transition: color 0.3s ease;}
@keyframes typingAnimation {from {width: 0;}to {width: 100%;}}
.obh-web{color: #00000000;width: 225px;justify-content: space-between;align-items: center;display: flex;margin: 1em auto 1em;}
</style>
<body>
<ul><h1 style="font-size: 20px;" align="center">oneblockh的个人主页</h1></ul>
<script>function isIE() {const userAgent = navigator.userAgent;return /MSIE|Trident/.test(userAgent);} if (isIE()) {window.location.href = "https://www.microsoft.com/zh-cn/edge/download?";alert('你正在使用ie浏览器,页面已经无法正常显示了,需要对你的浏览器进行更新。此后会跳转升级页面。');}</script>
</body></head>
<body>
  <div class="page" align="center">
  <div style="width: 155px;display:flex;" align="center">
    <div class="window">
    <div style="display: flex;align-self: center;">
    <img src="obh.png" alt="oneblockh" width="50" height="50" style="border-radius: 3px;">
    <div><h1 style="font-size: 20px;">oneblockh</h1><p class="typing">hello world</p></div>
    </div>
    <a href="https://github.com/oneblockh"><img src="github.png" alt="github" width="32" height="32" class="bh"><!github></a>
    <a href="https://space.bilibili.com/3546635246242772"><img src="bilibili.png" alt="github" width="32" height="32" class="bh"><!bilibili></a>
    <button onclick="toggleTheme()" class="buttons">切换主题</button></div>
    <p style="color:rgb(0, 0, 0, 0); font-size: 2px;">.</p>
    </div>
      <p style="color:rgb(0, 0, 0, 0); font-size: 3px;">.</p>
      <div class="window" style="font-size: 10px;width: 75%;"><div class="projectlists">
        <h1 style="font-size: 16px;">导航</h1><div class="card" align="center">
          <a><p style="color:rgb(0, 0, 0, 0); font-size: 3px;">.</p><div id="time-display"></div><div id="date-display"></div><p style="color:rgb(0, 0, 0, 0); font-size: 3px;">.</p></a><p style="color:rgb(0, 0, 0, 0); font-size: 8px;">.</p>
          <a href="https://space.bilibili.com/3546635246242772/dynamic"><h3>动态</h3><p>动态是我日常的生活</p></a></div>
        <h1 style="font-size: 16px;">项目</h1>
        <table id="repo-table" border="1" style="width:95%;text-align: center;" ><tbody></tbody></table>
      </div>
    </div>
  </div>
<script>
  /*时间*/
  function updateTime() {
  const timeDisplay = document.getElementById('time-display');
  const now = new Date();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const seconds = now.getSeconds().toString().padStart(2, '0');
  const timeString = `${hours}:${minutes}:${seconds}`;
  timeDisplay.textContent = timeString;}
  setInterval(updateTime, 1000);updateTime();
  /*年月日*/
  function updateDate() {
    const dateDisplay = document.getElementById('date-display');
    const now = new Date();
    const year = now.getFullYear();
    const month = (now.getMonth() + 1).toString().padStart(2, '0');
    const day = now.getDate().toString().padStart(2, '0');
    const dateString = `${year}-${month}-${day}`;
    dateDisplay.textContent = dateString;}
    setInterval(updateDate, 1000);
    updateDate();
  /*黑白主题切换*/
  function toggleTheme() {var body = document.body;body.classList.toggle('night-theme');}
</script>
<script>
  /*内容获取器*/
  const apiUrl = `https://api.github.com/users/oneblockh/repos`;
  fetch(apiUrl)
    .then(response => {
        if (!response.ok) {throw new Error('网络响应不正常');}return response.json();})
          .then(data => {
        const tableBody = document.querySelector('#repo-table tbody');
        tableBody.innerHTML = '';
        data.forEach(repo => {
          const row = document.createElement('tr');
          const nameCell = document.createElement('td');
          const descCell = document.createElement('td');
          const linkCell = document.createElement('td');
          nameCell.textContent = repo.name;
          descCell.textContent = repo.description || '无描述';
          const link = document.createElement('a');
          link.href = repo.html_url;
          link.textContent = '访问';
          linkCell.appendChild(link);
          row.appendChild(nameCell);
          row.appendChild(descCell);
          row.appendChild(linkCell);
          tableBody.appendChild(row);
          });}).catch(error => {console.error('获取数据时出错:', error);});
</script>
<div class="obh-web" align="center"><p style="color:blue;">.</p><a href="https://github.com/oneblockh/oneblockh.github.io/tree/main">关于网站项目</a><p style="color: red">by_oneblockh</p></div></body></html>
