<html lang="zh"><title>oneblockh</title><meta charset="utf-8"><!页面>
<head><style>
/* 重置列表样式 */
ul {list-style-type: none;margin: 0;padding: 0;overflow: hidden;background-color: #7f797903;/*position: fixed*/;top: 0px;left: 0px;width: 100%;}
/* 设置列表项为横向排列 */
li {float:center;}
/* 设置链接样式 */
li a {display: block;color: white;text-align: center;padding: 14px 16px;text-decoration: none;}
/* 鼠标悬停时的背景颜色变化 */
li a:hover {background-color: #111;}
:root {--text-color: #333;--wh-color:rgba(247, 240, 240, 0.5);}
body {
    height: 100%;
    width: 100%;
    background: url('background.png'); /* 将这里替换为你实际想要的背景图片路径，也可以使用背景颜色，例如 background-color: #f0f0f0; */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;

    margin: 0;
    padding: 0;
    position: fixed;       
    font-family: Arial, sans-serif;
    background-color: var(--background-color);
    color: var(--text-color);
    transition: background-color 0.5s ease, color 0.5s ease;
}
.window{background-color: rgba(200, 200, 200, 0);padding: 25px 10px;display: flex;justify-content: space-between;align-items: center;width: 75%; height: 248px;margin: 1em auto 1em; }
.window-headers{background-color: var(--wh-color); /* 半透明头部背景色 */padding: 5px 10px;justify-content: space-between;align-items: center;transition: background-color 0.1s ease, color 0.2s ease;border-radius: 11px;}
.window-headerss{background-color: rgba(0, 0, 0, 0); }
#time-display {font-size: 25px;font-weight: bold;text-align: center;}
#date-display {font-size: 15px;font-weight: bold;text-align: center;}
.night-theme {--text-color: #f4f4f4;--wh-color:rgba(12, 11, 11, 0.5);}
.buttons:hover{font-size:15px;}
section {display: none;opacity: 0;animation: fadeIn 1s ease forwards;}
@keyframes fadeIn {to {opacity: 1;}}
section:target {display: block;}
.projectlists{max-width: 100%;max-height: 280px; /* 设置最大高度 */overflow-y: auto; /* 添加垂直滚动条 */;}
table{border-radius: 3px;}
.typing {width: max-content;white-space: nowrap;overflow: hidden;border-right: 3px solid var(--text-color);/* 设置动画无限重复 */animation: typingAnimation 3s steps(40) infinite;}
@keyframes typingAnimation {from {width: 0;}to {width: 100%;}}
.obh-web{position: absolute;bottom: 0;color: #00000000;width: 100%;justify-content: center;align-items: center;display: flex; }
</style>

<ul><li><h1 style="font-size: 20px;" align="center">oneblockh的个人主页</h1></li></ul>

<body><h1 align="center" style="color:rgb(0, 0, 0, 0);font-size: 5px;">.</h1>

      <div class="window-headers">

<script>
  /*时间*/
  function updateTime() {
  const timeDisplay = document.getElementById('time-display');
  const now = new Date();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const seconds = now.getSeconds().toString().padStart(2, '0');
  const timeString = `${hours}:${minutes}:${seconds}`;
  timeDisplay.textContent = timeString;}
  setInterval(updateTime, 1000);updateTime();
  /*年月日*/
  function updateDate() {
    const dateDisplay = document.getElementById('date-display');
    const now = new Date();
    const year = now.getFullYear();
    const month = (now.getMonth() + 1).toString().padStart(2, '0');
    const day = now.getDate().toString().padStart(2, '0');
    const dateString = `${year}-${month}-${day}`;
    dateDisplay.textContent = dateString;}
    setInterval(updateDate, 1000);
    updateDate();
  /*黑白主题切换*/
  function toggleTheme() {var body = document.body;body.classList.toggle('night-theme');}
  /*页面切换*/
  function showPage(pageId) {const pages = document.querySelectorAll('section');pages.forEach(page => {page.style.display = 'none';});const targetPage = document.getElementById(pageId);targetPage.style.display = 'block';}
  /* 初始显示页面 1*/
  showPage('project');
</script>
<script>
  /*内容获取器*/
  const tableConfigs = [{ tableId: 'projectTable', filePath: 'projects.txt' },{ tableId: 'resourceTable', filePath: 'resources.txt' },{ tableId: 'newsTable', filePath: 'news.txt' },{ tableId: 'articleTable', filePath: 'articles.txt' }];
  tableConfigs.forEach(config => {const xhr = new XMLHttpRequest();xhr.open('GET', config.filePath, true);
  xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
              if (xhr.status === 200) {
                  const responseText = xhr.responseText;
                  const lines = responseText.split('\n');
                  const tableBody = document.querySelector(`#${config.tableId} tbody`);
                  lines.forEach(line => {
                      if (line.trim()!== '') {
                          const [name, link] = line.split(',');
                          const row = document.createElement('tr');
                          const nameCell = document.createElement('td');
                          const linkCell = document.createElement('td');
                          const anchor = document.createElement('a');
                          anchor.href = link;
                          anchor.textContent = name;
                          linkCell.appendChild(anchor);
                          row.appendChild(linkCell);
                          tableBody.appendChild(row);
}});}else {/*请求内容*/console.error(`请求 ${config.filePath} 文件失败，状态码: 1145141919810`, xhr.status);}}};xhr.send();});
</script>
